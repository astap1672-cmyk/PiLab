<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Графический редактор | PiLab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="zxcv.css">
</head>
<body class="paint-page-body">

    <header class="top-header">
        <div class="logo-container">
            <a href="../Main/1index1.html" class="logo"><span>P</span><i class="fa-solid fa-paint-roller"></i><span>Lab</span></a>
        </div>
        
        <div class="toolbar">
            <button><i class="fa-solid fa-sun"></i> ЯРКОСТЬ</button>
            <button><i class="fa-solid fa-expand"></i> ИЗМЕНИТЬ РАЗМЕР</button>
            <button><i class="fa-solid fa-crop"></i> ОБРЕЗАТЬ</button>
            <button><i class="fa-solid fa-rotate"></i> ПРЕОБРАЗОВАНИЕ</button>
            <div class="divider vertical"></div>
            <button><i class="fa-solid fa-pen"></i> РИСУНОК</button>
            <button><i class="fa-solid fa-font"></i> ТЕКСТ</button>
            <button><i class="fa-regular fa-square"></i> ФИГУРЫ</button>
        </div>
    </header>

    <div class="editor-content-area">
        <div class="background1"></div> <div class="workspace-wrapper">
            <div class="workspace" id="workspace">
                <img id="image" src="">
            </div>
        </div>

        <div class="editor-right-panel">
            <div class="sidebar-top">
                <label class="open-btn">
                    <i class="fa-solid fa-folder-open"></i> Открыть
                    <input type="file" id="fileInput" hidden>
                </label>
                <div class="divider"></div>
                <div class="zoom-control">
                    <div class="zoom-text">Масштаб: <span id="zoomValue">100%</span></div>
                    <div class="zoom-buttons">
                        <button id="zoomOut"><i class="fa-solid fa-minus"></i></button>
                        <button id="zoomIn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="rotate-control">
                    <div class="rotate-text">Поворот: <span id="rotateValue">0°</span></div>
                    <div class="history-buttons">
                        <button id="undo"><i class="fa-solid fa-rotate-left"></i></button>
                        <button id="redo"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="rotate-control">
                    <div class="rotate-text">Страница: 1/1</div>
                    <div class="route-buttons">
                        <button id="left"><i class="fa-solid fa-arrow-left"></i></button>
                        <button id="right"><i class="fa-solid fa-arrow-right"></i></button>
                        <button id="plus"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <div class="sidebar-actions">
                <button class="save-btn" id="saveBtn"><i class="fa-solid fa-download"></i> Сохранить</button>
                <button class="upload-btn" id="uploadBtn"><i class="fa-solid fa-upload"></i> Опубликовать</button>
            </div>
        </div>
    </div>

    <script src="zxcv.js"></script>
</body>
</html>
